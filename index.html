<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сонячний Калькулятор ☀️</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans">

    <div class="max-w-4xl mx-auto p-6">
        <header class="text-center mb-10">
            <h1 class="text-3xl font-bold text-yellow-600 uppercase tracking-wide">Solar ROI Visualizer</h1>
            <p class="text-gray-500">Графік повернення інвестицій</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            
            <div class="lg:col-span-1 bg-white shadow-xl rounded-2xl p-6 border border-gray-100 h-fit">
                <div class="grid gap-4">
                    <div>
                        <label class="block text-sm font-medium mb-1">Вартість системи ($)</label>
                        <input type="number" id="cost" value="5000" class="w-full p-2 border rounded-lg outline-none focus:ring-2 focus:ring-yellow-500">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1">Споживання (кВт·год/міс)</label>
                        <input type="number" id="consumption" value="300" class="w-full p-2 border rounded-lg outline-none focus:ring-2 focus:ring-yellow-500">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1">Тариф (грн/кВт)</label>
                        <input type="number" id="tariff" value="4.32" step="0.01" class="w-full p-2 border rounded-lg outline-none focus:ring-2 focus:ring-yellow-500">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1">Курс (грн/$)</label>
                        <input type="number" id="rate" value="40" class="w-full p-2 border rounded-lg outline-none focus:ring-2 focus:ring-yellow-500">
                    </div>
                    <button onclick="updateDashboard()" class="w-full bg-yellow-500 hover:bg-yellow-600 text-white font-bold py-3 rounded-xl transition shadow-lg">
                        Оновити графік
                    </button>
                </div>
            </div>

            <div class="lg:col-span-2 bg-white shadow-xl rounded-2xl p-6 border border-gray-100">
                <div id="result-text" class="mb-6">
                    <p class="text-xl">Окупність: <span id="years" class="font-bold text-yellow-600">0</span> років</p>
                </div>
                <div class="relative h-[300px]">
                    <canvas id="roiChart"></canvas>
                </div>
            </div>

        </div>
    </div>

    <script>
        let myChart = null;

        function updateDashboard() {
            const costUsd = parseFloat(document.getElementById('cost').value);
            const monthlyKwh = parseFloat(document.getElementById('consumption').value);
            const tariff = parseFloat(document.getElementById('tariff').value);
            const rate = parseFloat(document.getElementById('rate').value);

            const costGrn = costUsd * rate;
            const annualSavings = monthlyKwh * 12 * tariff;
            const paybackYears = costGrn / annualSavings;

            document.getElementById('years').innerText = paybackYears.toFixed(1);

            renderChart(costGrn, annualSavings);
        }

        function renderChart(totalCost, annualSavings) {
            const ctx = document.getElementById('roiChart').getContext('2d');
            
            // Розрахунок даних на 15 років
            const labels = Array.from({length: 16}, (_, i) => i); // [0, 1, 2...15]
            const costLine = labels.map(() => totalCost);
            const savingsLine = labels.map(year => year * annualSavings);

            if (myChart) {
                myChart.destroy(); // Знищуємо старий графік перед створенням нового
            }

            myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels.map(l => l + ' р.'),
                    datasets: [
                        {
                            label: 'Витрати на систему (грн)',
                            data: costLine,
                            borderColor: '#ef4444',
                            borderDash:,
                            fill: false,
                            tension: 0.1
                        },
                        {
                            label: 'Накопичена економія (грн)',
                            data: savingsLine,
                            backgroundColor: 'rgba(234, 179, 8, 0.2)',
                            borderColor: '#eab308',
                            fill: true,
                            tension: 0.3
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { position: 'bottom' }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            ticks: {
                                callback: value => value.toLocaleString() + ' ₴'
                            }
                        }
                    }
                }
            });
        }

        // Запуск при завантаженні
        updateDashboard();
    </script>
</body>
</html>
